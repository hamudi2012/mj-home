backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /mj-home/images

collections:
  - name: "products"
    label: "Produk MJ Shops"
    folder: "src/data"
    create: true
    slug: "{{slug}}"
    extension: json
    format: json
    fields:
      - { label: "Nama", name: "nama", widget: "string" }
      - { label: "Harga", name: "harga_diskon", widget: "number" }
      - { label: "Foto", name: "foto", widget: "image" }
 
