<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MJ Shops Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'git-gateway',
          branch: 'main' // Hapus api_root agar otomatis menggunakan Git Gateway Netlify
        },
        // Sesuaikan path folder dengan struktur repo kamu
        media_folder: 'public/images/products',
        public_folder: '/images/products',
        
        collections: [
          {
            name: 'products',
            label: 'Produk MJ Shops',
            folder: 'src/data',
            create: true,
            slug: '{{slug}}',
            extension: 'json',
            format: 'json',
            fields: [
              { label: 'Nama Produk', name: 'nama', widget: 'string' },
              { label: 'Slug/URL', name: 'slug', widget: 'string', hint: 'Contoh: gamis-syari' },
              { label: 'Harga Asli', name: 'harga_asli', widget: 'number', required: false },
              { label: 'Harga Diskon', name: 'harga_diskon', widget: 'number' },
              { 
                label: 'Kategori', 
                name: 'kategori', 
                widget: 'select', 
                options: ['Fashion', 'Food', 'Electronics', 'Lainnya'] 
              },
              { label: 'Stok', name: 'stok', widget: 'number', default: 10 },
              { label: 'Deskripsi', name: 'deskripsi', widget: 'text' },
              { label: 'Foto Utama', name: 'foto', widget: 'image' },
              { 
                label: 'Rating', 
                name: 'rating', 
                widget: 'number', 
                default: 5, 
                value_type: 'float',
                min: 1, 
                max: 5 
              },
              { label: 'Terjual', name: 'terjual', widget: 'number', default: 0 }
            ]
          }
        ]
      }
    });

    // Script agar otomatis redirect setelah login di HP
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
