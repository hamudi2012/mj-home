<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MJ Shops Admin - Direct Access</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
    CMS.init({
      config: {
        // Menggunakan backend 'github' langsung tanpa gateway
        backend: {
          name: 'github',
          repo: 'hamudi2012/mj-home', // Nama repo kamu
          branch: 'main',
          auth_type: 'token' // Menggunakan Token agar tidak perlu login Netlify
        },
        
        media_folder: 'public/images/products',
        public_folder: '/images/products',
        
        collections: [
          {
            name: 'products',
            label: 'Produk MJ Shops',
            folder: 'src/data',
            create: true,
            slug: '{{slug}}',
            extension: 'json',
            format: 'json',
            fields: [
              { label: 'Nama Produk', name: 'nama', widget: 'string' },
              { label: 'Slug/URL', name: 'slug', widget: 'string' },
              { label: 'Harga Diskon', name: 'harga_diskon', widget: 'number' },
              { label: 'Stok', name: 'stok', widget: 'number', default: 10 },
              { label: 'Deskripsi', name: 'deskripsi', widget: 'text' },
              { label: 'Foto Utama', name: 'foto', widget: 'image' }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
