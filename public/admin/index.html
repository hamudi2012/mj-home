<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MJ Admin</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'hamudi2012/mj-home',
          branch: 'main',
          auth_type: 'token' 
        },
        load_config_file: false, // Memaksa mengabaikan file config.yml jika masih ada error di sana
        media_folder: 'public/images/products',
        public_folder: '/images/products',
        collections: [
          {
            name: 'shops',
            label: '🛍️ MJ Shops',
            folder: 'src/data/shops',
            create: true,
            format: 'json',
            fields: [
              { label: 'Nama', name: 'nama', widget: 'string' },
              { label: 'Harga', name: 'harga', widget: 'number' },
              { label: 'Foto', name: 'foto', widget: 'image' }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
